<script>
var SUMMARIES=[
{topic:"The Oath of Citizenship",icon:"\ud83c\udde8\ud83c\udde6",sections:[
{title:"Understanding the Oath",text:"In Canada, loyalty is pledged to a person (the Sovereign) who represents all Canadians, not to a document, flag, or country. In our constitutional monarchy, the Sovereign personifies Canada."},
{title:"What You Promise",text:"You swear or affirm to be faithful and bear true allegiance to the Sovereign (Queen/King of Canada), their heirs and successors. You promise to faithfully observe the laws of Canada including the Constitution, which recognizes Aboriginal and treaty rights of First Nations, Inuit and M\u00e9tis peoples, and to fulfil your duties as a Canadian citizen."},
{title:"Applying for Citizenship",text:"Officials check your status and ensure you meet requirements. The test covers two things: (1) knowledge of Canada and rights/responsibilities, and (2) adequate knowledge of English or French. Adults 55+ do not need to write the test. After passing, you receive a Notice to Appear to take the Oath at a ceremony where you sign the form and receive your Citizenship Certificate."}
]},
{topic:"Rights & Responsibilities",icon:"\u2696\ufe0f",sections:[
{title:"Sources of Canadian Law",text:"Laws passed by Parliament and provincial legislatures, English common law, the civil code of France, and the unwritten constitution from Great Britain. Together these secure an 800-year tradition of ordered liberty dating back to Magna Carta (1215)."},
{title:"Fundamental Freedoms",text:"Freedom of conscience and religion; freedom of thought, belief, opinion and expression (including speech and press); freedom of peaceful assembly; and freedom of association."},
{title:"Charter Rights (1982)",text:"Entrenched in 1982. Begins: 'Whereas Canada is founded upon principles that recognize the supremacy of God and the rule of law.' Key rights: Mobility Rights (live/work anywhere, passport), Aboriginal Peoples' Rights, Official Language Rights (French/English equal), Multiculturalism (fundamental characteristic of Canadian heritage)."},
{title:"Citizenship Responsibilities",text:"Obeying the law (no person or group is above it), taking responsibility for oneself and family (work, personal dignity), serving on a jury when called, voting in elections, helping others/volunteering in the community, and protecting Canada's natural, cultural and architectural heritage and environment."},
{title:"Equality",text:"Men and women are equal under the law. Canada does not tolerate spousal abuse, honour killings, female genital mutilation, forced marriage, or other gender-based violence. These are severely punished."},
{title:"Defending Canada",text:"No compulsory military service. Serving in the Canadian Forces (navy, army, air force) is a noble career. You can serve in part-time reserves, Coast Guard, police, or fire department. Young people can join the cadets."},
{title:"Habeas Corpus",text:"The right to challenge unlawful detention by the state. Comes from English common law."}
]},
{topic:"Who We Are",icon:"\ud83c\udf41",sections:[
{title:"Three Founding Peoples",text:"Aboriginal, French, and British. Canada is the only constitutional monarchy in North America. Our institutions uphold Peace, Order and Good Government (key phrase from 1867 BNA Act). Canada is called the 'Great Dominion.'"},
{title:"Aboriginal Peoples",text:"Three groups: First Nations (about 65% of Aboriginal people, ~600 communities, half on-reserve/half off), M\u00e9tis (30%, mixed Aboriginal/European ancestry, Prairie provinces, speak Michif), and Inuit (4%, 'the people' in Inuktitut, scattered Arctic communities). Rights protected in Constitution. Royal Proclamation of 1763 (King George III) first guaranteed territorial rights."},
{title:"Residential Schools",text:"1800s to 1980s: federal government placed Aboriginal children in residential schools to assimilate them. Schools were poorly funded, some children physically abused. Languages and cultural practices mostly prohibited. Ottawa formally apologized in 2008."},
{title:"English and French",text:"18M Anglophones, 7M Francophones. Majority of Francophones in Quebec; 1M in Ontario, New Brunswick, Manitoba. New Brunswick is the only officially bilingual province. Quebecers mostly descended from 8,500 French settlers of the 1600s-1700s. House of Commons recognized Quebecois as a nation within united Canada (2006). 1M Anglo-Quebecers have 250-year heritage."},
{title:"The Acadians",text:"Descendants of French colonists who settled in the Maritime provinces starting in 1604. Between 1755-1763 (war between Britain and France), more than two-thirds were deported from their homeland. This ordeal is known as the 'Great Upheaval.' Today Acadian culture is flourishing."},
{title:"Diversity",text:"Majority born in Canada since 1800s, but called a 'land of immigrants.' Largest groups: English, French, Scottish, Irish, German, Italian, Chinese, Aboriginal, Ukrainian, Dutch, South Asian, Scandinavian. Since 1970s, most immigrants from Asian countries. Chinese languages are 2nd most spoken at home. Largest religion: Catholic. Gay and lesbian Canadians enjoy full protection and equal treatment including civil marriage."}
]},
{topic:"Canada's History",icon:"\ud83d\udcdc",sections:[
{title:"Aboriginal Peoples (Pre-Contact)",text:"When Europeans arrived, all regions were occupied. Huron-Wendat and Iroquois were farmers/hunters. Cree and Dene were hunter-gatherers. Sioux followed bison herds. Inuit lived off Arctic wildlife. West Coast peoples dried and smoked fish. Warfare was common over land, resources, and prestige."},
{title:"First Europeans",text:"Vikings from Iceland reached Labrador and Newfoundland 1,000 years ago (L'Anse aux Meadows, World Heritage site). John Cabot mapped East Coast in 1497 for England. Jacques Cartier explored St. Lawrence (1534-1542), heard 'kanata' (village). By 1550s, 'Canada' appeared on maps."},
{title:"New France",text:"1604: First settlement by Pierre de Monts and Samuel de Champlain (St. Croix Island, then Port-Royal). 1608: Champlain built fortress at Quebec City. Champlain allied with Algonquin, Montagnais, Huron against Iroquois. Fur trade drove the economy. Outstanding leaders: Jean Talon, Bishop Laval, Count Frontenac. Voyageurs and coureurs des bois travelled by canoe forming alliances with First Nations."},
{title:"Struggle for a Continent",text:"1670: King Charles II granted Hudson's Bay Company exclusive trading rights. English colonies along the Atlantic became richer than New France. 1759: British defeated French at Plains of Abraham (Quebec City), ending France's empire in America. Both commanders (Wolfe and Montcalm) were killed."},
{title:"Quebec Act & Loyalists",text:"Quebec Act 1774: constitutional foundation allowing Catholic religious freedom (including holding public office), restored French civil law, maintained British criminal law. After 1776, 40,000+ Loyalists fled American Revolution to Nova Scotia and Quebec. Joseph Brant led thousands of Mohawk. About 3,000 black Loyalists came north. Loyalists came from Dutch, German, British, Scandinavian, Aboriginal origins and many religious backgrounds."},
{title:"Democracy & Responsible Government",text:"First assembly: Halifax 1758. PEI 1773. NB 1785. Constitutional Act 1791 split Quebec into Upper Canada (Ontario, Loyalist/Protestant/English) and Lower Canada (Quebec, Catholic/French). Granted elected assemblies. Rebellions of 1837-38: reformers in both Canadas wanted faster progress to democracy; defeated by British troops. Lord Durham recommended responsible government. Achieved in Nova Scotia (1847-48) and the Canadas (1848-49) under Lord Elgin. La Fontaine became first leader of responsible government."},
{title:"Abolition of Slavery",text:"1793: Upper Canada (Lt. Gov. Simcoe) first in British Empire to move toward abolition. 1807: Parliament banned buying/selling slaves. 1833: abolished throughout Empire. Thousands escaped via Underground Railroad (Christian anti-slavery network). Mary Ann Shadd Cary became first woman publisher in Canada (1853)."},
{title:"Confederation (1867)",text:"1864-1867: Representatives of NS, NB, and Province of Canada created the Dominion of Canada. Two levels: federal and provincial. Old Province of Canada split into Ontario and Quebec. BNA Act passed by British Parliament. Born July 1, 1867. Sir Leonard Tilley suggested 'Dominion of Canada' (inspired by Psalm 72). Until 1982 celebrated as Dominion Day, now Canada Day."},
{title:"First PM & Expansion",text:"Sir John A. Macdonald: first PM, born Scotland 1815, lawyer in Kingston. His portrait is on the $10 bill. January 11 is Sir John A. Macdonald Day. Sir George-\u00c9tienne Cartier: key Quebec architect, railway lawyer, led Quebec into Confederation. Expansion: MB 1870, BC 1871, PEI 1873, Arctic Islands 1880, Yukon 1898, AB/SK 1905, NL 1949, Nunavut 1999."},
{title:"Challenge in the West",text:"1869: Canada took over northwest from HBC. Louis Riel led M\u00e9tis uprising, seized Fort Garry. Manitoba created 1870. Riel elected to Parliament but never took seat. Second rebellion 1885 in Saskatchewan led to Riel's execution. Riel is seen as hero, defender of M\u00e9tis rights, father of Manitoba. NWMP (now RCMP) established 1873. Founded Fort Calgary, Fort MacLeod, Regina (headquarters)."},
{title:"Railway from Sea to Sea",text:"BC joined 1871 after promise of railway. CPR completed Nov 7, 1885 (Donald Smith drove last spike). Built by European and Chinese labour. Chinese faced discrimination including Head Tax (race-based entry fee). Government apologized in 2006."},
{title:"War of 1812",text:"After Trafalgar (1805), Royal Navy ruled waves. US invaded Canada June 1812. Key figures: Major-General Sir Isaac Brock (captured Detroit, killed at Queenston Heights), Chief Tecumseh, Laura Secord (walked 19 miles/30km to warn of American attack, contributed to victory at Battle of Beaver Dams), Lt-Col Charles de Salaberry (turned back 4,000 Americans at Ch\u00e2teauguay). 1813: Americans burned York (Toronto). 1814: Major-General Robert Ross burned White House. By 1814 invasion failed. Present-day border is partly an outcome of this war."},
{title:"WWI & Women's Suffrage",text:"600,000+ Canadians served (out of 8M population). Vimy Ridge April 9, 1917 (10,000 killed/wounded). April 9 is Vimy Day. Total: 60,000 killed, 170,000 wounded. 1914-1920: 8,000 former Austro-Hungarian subjects interned. Women's suffrage: Dr. Emily Stowe founder. Manitoba first province (1916). Federal vote 1917-18. Agnes Macphail first woman MP (1921). Quebec granted women vote 1940."},
{title:"Between the Wars & WWII",text:"British Empire became Commonwealth. Roaring Twenties prosperity. 1929 crash led to Great Depression (27% unemployment 1933). Bank of Canada created 1934. WWII: 1M+ served, 44,000 killed. D-Day June 6, 1944 (15,000 Canadians at Juno Beach, 1 in 10 Allied soldiers). Canada liberated Netherlands 1944-45. RCN became 3rd largest navy. Japanese Canadians forcibly relocated (government apologized 1988). Remembrance Day: Nov 11, 11th hour of 11th day of 11th month. Over 110,000 Canadians have given their lives in all wars."},
{title:"Sir Wilfrid Laurier",text:"First French-Canadian PM since Confederation. Encouraged western immigration. His portrait is on the $5 bill. November 20 is Sir Wilfrid Laurier Day. Under his leadership, 170,000 Ukrainians, 115,000 Poles and tens of thousands from Germany, France, Norway, Sweden settled in the West before 1914."}
]},
{topic:"Modern Canada",icon:"\ud83c\udfd9\ufe0f",sections:[
{title:"Trade & Economic Growth",text:"Post-war prosperity. GATT (now WTO) opened trade. Oil discovered in Alberta 1947. By 1951 majority could afford food/shelter/clothing. 1945-1970: one of strongest economies. Today one of world's highest living standards."},
{title:"Social Programs",text:"Canada Health Act ensures basic coverage. Employment insurance (1940). Old Age Security (1927). Canada/Quebec Pension Plans (1965). Publicly funded education by provinces."},
{title:"International Engagement",text:"Cold War: joined NATO (military alliance) and NORAD (aerospace defence with US). Joined UN. Korean War 1950-53: 500 dead, 1,000 wounded. UN peacekeeping in Egypt, Cyprus, Haiti, Yugoslavia, Afghanistan."},
{title:"Quebec & Bilingualism",text:"Quiet Revolution (1960s rapid change). 1963: Royal Commission on Bilingualism. Official Languages Act (1969): French/English services in federal government. La Francophonie founded 1970. Sovereignty referendums defeated 1980 and 1995."},
{title:"A Changing Society",text:"Over 50 years Canada became more flexible/open. 1948: Japanese-Canadians gained vote. Aboriginal people granted vote 1960. Every citizen over 18 may vote. Canada welcomed refugees: 37,000 from Hungary (1956), 50,000+ Vietnamese (1975). By 1960s, one-third had origins neither British nor French."},
{title:"Arts & Culture",text:"Literature: Stephen Leacock, Louis H\u00e9mon, Robertson Davies, Margaret Laurence, Mordecai Richler, Joy Kogawa, Michael Ondaatje, Rohinton Mistry. Visual arts: Group of Seven (founded 1920, rugged wilderness landscapes). Emily Carr painted West Coast forests and Aboriginal artifacts. Les Automatistes (Quebec abstract art, 1950s, Jean-Paul Riopelle). Kenojuak Ashevak pioneered modern Inuit art. Film: Denys Arcand, Norman Jewison, Atom Egoyan."},
{title:"Sports & Science",text:"Basketball invented by James Naismith (1891). Hockey dominated by Canadian teams. Donovan Bailey (1996 Olympic sprinter). Chantal Petitclerc (Paralympic wheelchair racer). Wayne Gretzky (Edmonton Oilers 1979-1988). Terry Fox's Marathon of Hope (1980). Rick Hansen circled globe in wheelchair (1985). Paul Henderson scored 1972 Summit Series winning goal ('goal heard around the world'). Canadian Space Agency since 1989, Canadarm. Nobel Prize winners: Gerhard Herzberg, John Polanyi, Sidney Altman, Richard E. Taylor, Michael Smith, Bertram Brockhouse. Marshall McLuhan and Harold Innis: pioneer thinkers."},
{title:"Great Inventions",text:"Alexander Graham Bell: telephone. Joseph-Armand Bombardier: snowmobile. Sir Sandford Fleming: standard time zones. Matthew Evans & Henry Woodward: first electric light bulb (sold patent to Edison). Reginald Fessenden: radio (first wireless voice message). Dr. Wilder Penfield: pioneering brain surgeon ('greatest living Canadian'). Dr. John A. Hopps: first cardiac pacemaker. SPAR/NRC: Canadarm. Mike Lazaridis & Jim Balsillie: BlackBerry. Sir Frederick Banting & Charles Best: insulin (saved 16 million lives)."}
]},
{topic:"Government",icon:"\ud83c\udfdb\ufe0f",sections:[
{title:"Three Key Facts",text:"Federal state, parliamentary democracy, constitutional monarchy."},
{title:"Federal State",text:"Federal government: defence, foreign policy, interprovincial trade, currency, navigation, criminal law, citizenship. Provinces: municipal government, education, health, natural resources, property/civil rights, highways. Shared: agriculture, immigration. Each province has elected Legislative Assembly. Three territories have governments/assemblies with similar functions but not province status."},
{title:"Parliamentary Democracy",text:"People elect members to House of Commons and provincial legislatures. Representatives pass laws, approve spending, keep government accountable. Cabinet ministers must retain 'confidence of the House.' Parliament: Sovereign + Senate + House of Commons. Provincial: Lieutenant Governor + elected Assembly."},
{title:"How a Bill Becomes Law",text:"Step 1: First Reading (introduced/printed). Step 2: Second Reading (debate principle). Step 3: Committee Stage (clause by clause). Step 4: Report Stage (amendments). Step 5: Third Reading (debate/vote). Step 6: Senate (similar process). Step 7: Royal Assent (Governor General on behalf of Sovereign)."},
{title:"Constitutional Monarchy",text:"Head of State: hereditary Sovereign (reigns per Constitution). Represented by Governor General (5 years) federally, Lieutenant Governors in provinces (also 5 years). Head of Government: PM (directs governing). In provinces: Premier. Territories: Commissioner (federal representative). Other constitutional monarchies: Denmark, Norway, Sweden, Australia, NZ, Netherlands, Spain, Thailand, Japan, Jordan, Morocco."},
{title:"Provincial Legislature Titles",text:"Members of the Legislative Assembly (MLAs), Members of the National Assembly (MNAs - Quebec), Members of the Provincial Parliament (MPPs - Ontario), or Members of the House of Assembly (MHAs - some Atlantic provinces)."},
{title:"The PM and Cabinet",text:"PM selects Cabinet ministers (mostly from House of Commons). They run federal departments, prepare budget, propose laws. Senators appointed by GG on PM's advice, serve until 75. No bill becomes law without passing both chambers and Royal Assent."}
]},
{topic:"Federal Elections",icon:"\ud83d\uddf3\ufe0f",sections:[
{title:"How Elections Work",text:"Must be held 3rd Monday in October every 4 years. PM may ask GG for earlier election. 308 electoral districts (ridings/constituencies). Each riding elects 1 MP. Citizens 18+ may run for office."},
{title:"Who Can Vote",text:"Canadian citizens, 18+ on voting day, on voters' list. National Register of Electors managed by Elections Canada (neutral agency of Parliament). Voter information card mailed to registered electors. Can be added to list on election day."},
{title:"Secret Ballot",text:"No one can watch you vote or insist you tell them. Not employers, family, or union representatives. After polls close, ballots counted and results announced."},
{title:"Voting Procedure",text:"Receive voter information card. Go to polling station with card and ID. Mark X next to candidate of choice. Fold ballot, present to officials. Official tears off number, you deposit in ballot box."},
{title:"Government Formation",text:"Party with most seats forms government. Leader becomes PM (appointed by GG). Majority government: 50%+ seats. Minority: less than 50%. Must maintain confidence of MPs. If defeated on major issue (e.g., budget), government falls."},
{title:"Parties & Opposition",text:"Three major parties currently: Conservative Party, New Democratic Party, Liberal Party. Opposition parties peacefully oppose or improve government proposals. Official Opposition: opposition party with most seats, also called Her Majesty's Loyal Opposition."},
{title:"Other Levels",text:"Municipal government: mayor/reeve + councillors/aldermen. Responsible for planning, streets, sanitation, snow removal, firefighting, ambulance, recreation, transit, local police. Provincial/territorial/municipal elections use secret ballot with different rules from federal. First Nations have band chiefs and councillors responsible for housing, schools, services on reserves."}
]},
{topic:"Justice System",icon:"\u2696\ufe0f",sections:[
{title:"Principles",text:"Presumption of innocence (everyone innocent until proven guilty). Due process (government must respect all legal rights). Rule of law (applies to everyone: judges, politicians, police). Laws are written rules made by elected representatives, intended to provide order and express Canadian values."},
{title:"Courts",text:"Supreme Court of Canada: highest court. Federal Court: federal government matters. In most provinces: appeal court, trial court (sometimes Court of Queen's Bench or Supreme Court). Also: provincial courts for lesser offences, family courts, traffic courts, small claims courts."},
{title:"Police",text:"RCMP enforces federal laws throughout Canada. Serves as provincial police in all provinces/territories except Ontario and Quebec (which have their own provincial forces). Municipal police in most major cities. You can question police about their service or conduct; almost all forces have a complaints process."},
{title:"Legal Help",text:"Lawyers help with legal problems and represent you in court. If you cannot pay, most communities have legal aid services available free or at low cost."}
]},
{topic:"Canadian Symbols",icon:"\ud83c\udde8\ud83c\udde6",sections:[
{title:"The Crown",text:"Symbol of the state for 400+ years. Constitutional monarchy since Confederation 1867 (Queen Victoria's reign). The Crown symbolizes government including Parliament, legislatures, courts, police, Canadian Forces."},
{title:"Flags",text:"Current maple leaf flag raised 1965. Red-white-red pattern from flag of Royal Military College, Kingston (founded 1876). Red and white: colours of France and England since Middle Ages, Canada's national colours since 1921 (King George V). Union Jack is official Royal Flag. Canadian Red Ensign served as flag for ~100 years. Provinces/territories have their own flags."},
{title:"Key Symbols",text:"Maple leaf: best-known symbol, adopted by French Canadians in 1700s, on uniforms since 1850s, carved on headstones of fallen soldiers. Beaver: adopted centuries ago as HBC symbol, on five-cent coin, coats of arms of Saskatchewan, Alberta, Montreal, Toronto. Fleur-de-lys: French royalty symbol 1000+ years, Quebec flag (1948). Coat of arms: adopted after WWI, motto 'A mari usque ad mare' (from sea to sea), symbols of England, France, Scotland, Ireland + red maple leaves."},
{title:"Parliament Buildings",text:"Gothic Revival architecture (Queen Victoria era). Completed 1860s. Centre Block destroyed by fire 1916, rebuilt 1922. Library is only original part remaining. Peace Tower completed 1927 (WWI memorial). Memorial Chamber contains Books of Remembrance with names of soldiers who died. Provincial legislatures: Quebec National Assembly (French Second Empire style), others Baroque/Romanesque/neoclassical."},
{title:"Sports",text:"Hockey: most popular spectator sport, national winter sport, developed in 1800s. NHL plays for Stanley Cup (donated by Lord Stanley, GG, 1892). Clarkson Cup (2005, Adrienne Clarkson) for women's hockey. Canadian football: 2nd most popular, Grey Cup (Lord Grey, GG, 1909). Curling: introduced by Scottish pioneers. Lacrosse: official summer sport, first played by Aboriginals. Soccer: most registered players. Basketball: invented by Canadian James Naismith (1891)."},
{title:"O Canada & Royal Anthem",text:"O Canada: proclaimed national anthem 1980, first sung in Quebec City 1880. French and English have different words. Royal Anthem: 'God Save the Queen (King)' can be played/sung to honour the Sovereign."},
{title:"Order of Canada & Victoria Cross",text:"Order of Canada: started 1967 (centennial of Confederation). Victoria Cross (V.C.): highest honour, for conspicuous bravery, awarded to 96 Canadians since 1854. Notable recipients: Lt. Alexander Roberts Dunn (first Canadian, Crimean War), Able Seaman William Hall (first black man), Corporal Filip Konowal (born Ukraine), Captain Billy Bishop (WWI flying ace), Lt. Robert Hampton Gray (last Canadian, WWII)."},
{title:"Important Dates",text:"New Year's Day: Jan 1. Sir John A. Macdonald Day: Jan 11. Good Friday/Easter Monday. Vimy Day: Apr 9. Victoria Day: Monday before May 25 (Sovereign's birthday). F\u00eate nationale (Quebec): Jun 24 (St. John the Baptist). Canada Day: Jul 1. Labour Day: 1st Monday Sep. Thanksgiving: 2nd Monday Oct. Remembrance Day: Nov 11. Sir Wilfrid Laurier Day: Nov 20. Christmas: Dec 25. Boxing Day: Dec 26."}
]},
{topic:"Economy",icon:"\ud83d\udcb0",sections:[
{title:"Three Industry Types",text:"Service industries: 75%+ of workers (transportation, education, healthcare, construction, banking, communications, retail, tourism, government). Manufacturing: paper, high tech, aerospace, automobiles, machinery, food, clothing. Natural resources: forestry, fishing, agriculture, mining, energy. Economy historically based on farming and exporting fur, fish, timber."},
{title:"Trade",text:"Canada has always been a trading nation. Largest partner: United States (biggest bilateral trading relationship in the world, 75%+ of exports). Free trade with US enacted 1988. NAFTA 1994 (with Mexico). G8 member. Exports: energy, industrial goods, machinery, automotive, agricultural, fishing, forestry products, consumer goods. Peace Arch at Blaine, Washington symbolizes the close ties ('world's longest undefended border')."},
{title:"Historical Economy",text:"First companies formed during French/British regimes for fur trade. Hudson's Bay Company dominated from Fort Garry (Winnipeg) to Fort Victoria. Montreal Stock Exchange opened 1832. First financial institutions in late 18th/early 19th centuries."}
]},
{topic:"Regions & Geography",icon:"\ud83d\uddfa\ufe0f",sections:[
{title:"Overview",text:"2nd largest country (10M km\u00b2). Three oceans: Pacific (west), Atlantic (east), Arctic (north). 10 provinces, 3 territories. ~34M people (majority in cities). Capital: Ottawa (chosen 1857 by Queen Victoria, 4th largest metro, National Capital Region 4,700 km\u00b2)."},
{title:"Atlantic Provinces",text:"NL (capital St. John's, most easterly point, own time zone, oldest British colony, offshore oil, Labrador hydro). PEI (Charlottetown, smallest province, beaches/red soil/potatoes, birthplace of Confederation, Confederation Bridge, Anne of Green Gables by Lucy Maud Montgomery). NS (Halifax, most populous Atlantic province, gateway to Canada, Bay of Fundy highest tides, largest naval base, deep-water ice-free port, 700+ annual festivals, Celtic/Gaelic traditions). NB (Fredericton, founded by Loyalists, St. John River, only bilingual province, Moncton is principal Francophone Acadian centre, 1/3 population lives/works in French)."},
{title:"Central Canada",text:"More than half of Canadians live near Great Lakes and St. Lawrence River. Ontario and Quebec produce 75%+ of Canadian manufactured goods. Quebec (capital Quebec City, ~8M people, 75%+ French-speaking, largest hydro producer, pulp and paper, pharmaceuticals, aeronautics, Montreal is 2nd largest city and 2nd largest French-speaking city after Paris). Ontario (capital Toronto, 12M+ people, largest and most diverse, financial centre, Niagara vineyards/wines, dairy/beef/poultry/grains, largest French-speaking population outside Quebec, Five Great Lakes: Ontario, Erie, Huron, Michigan (US), Superior (largest freshwater lake in world))."},
{title:"Prairie Provinces",text:"Rich in energy and fertile farmland. Dry climate, cold winters, hot summers. Manitoba (capital Winnipeg, Portage and Main intersection, St. Boniface French Quarter 45,000 Francophones, 14% Ukrainian origins, largest Aboriginal population of any province 15%+). Saskatchewan (capital Regina, RCMP training academy, 40% of Canada's arable land, largest grain/oilseed producer, richest uranium/potash deposits, Saskatoon: mining HQ). Alberta (capital Edmonton, most populous prairie province, Lake Louise/Rocky Mountains named for Princess Louise Caroline Alberta, 5 national parks including Banff 1885, Badlands fossils/dinosaurs, largest oil/gas producer, oil sands, vast cattle ranches)."},
{title:"West Coast",text:"BC (capital Victoria, 4M people, Canada's westernmost province, Pacific gateway, Port of Vancouver largest/busiest, forestry 50% of goods (lumber, newsprint, pulp/paper), mining, fishing, Okanagan Valley fruit orchards and wine, ~600 provincial parks, large Asian communities (Chinese and Punjabi most spoken after English))."},
{title:"Northern Territories",text:"One-third of land mass, population ~100,000. Gold, lead, copper, diamond, zinc mines. Oil/gas being developed. 'Land of the Midnight Sun' (24hr daylight in summer, 3 months darkness in winter). Tundra: vast rocky Arctic plain, permafrost, no trees. Inuit art sold worldwide. Yukon (capital Whitehorse, Gold Rush 1890s celebrated in poetry of Robert W. Service, White Pass and Yukon Railway, Mount Logan highest mountain in Canada, coldest temperature -63\u00b0C). NWT (capital Yellowknife pop 20,000, 'diamond capital of North America', 50%+ Aboriginal, Mackenzie River 4,200 km 2nd longest in North America). Nunavut (capital Iqaluit, 'our land' in Inuktitut, established 1999, 85% Inuit, 19-member Legislative Assembly by consensus, Inuktitut is first language in schools). Canadian Rangers (part of Forces Reserves) patrol the Arctic by snowmobile and ATV."}
]}
];

var S={scr:"home",qs:[],isT:false,idx:0,ans:{},rev:false,tl:TT,res:null,stats:[],diff:0,revTopic:null,openSec:0};

function stopTimer(){if(tmr){clearInterval(tmr);tmr=null;}}
function startTimer(){stopTimer();tmr=setInterval(function(){S.tl--;if(S.tl<=0){stopTimer();finishQuiz();}else renderQuiz($("#app"));},1000);}
function go(scr){S.scr=scr;render();}

function render(){var app=$("#app");app.innerHTML="";stopTimer();
if(S.scr==="home")renderHome(app);
else if(S.scr==="study-pick")renderPicker(app,true);
else if(S.scr==="rev-pick")renderPicker(app,false);
else if(S.scr==="revision")renderRevision(app);
else if(S.scr==="quiz"){renderQuiz(app);if(S.isT)startTimer();}
else if(S.scr==="results")renderResults(app);}

function renderHome(app){
var tot=S.stats.length,p=S.stats.filter(function(s){return s.passed;}).length,avg=tot?Math.round(S.stats.reduce(function(a,s){return a+s.score;},0)/tot):0;

[{i:"\ud83d\udcdd",t:"Test Mode",ds:TS+" questions \u00b7 30 min \u00b7 75% to pass",c:"",fn:function(){S.qs=shuffle(QUESTIONS).slice(0,TS);S.isT=true;S.idx=0;S.ans={};S.rev=false;S.tl=TT;go("quiz");}},{i:"\ud83d\udcd6",t:"Study Mode",ds:"Practice by category & difficulty",c:"",fn:function(){S.diff=0;go("study-pick");}},{i:"\ud83d\udd0d",t:"Revision Mode",ds:"Topic summaries from the guide",c:" rev",fn:function(){go("rev-pick");}}].forEach(function(b){var btn=h("button","mcard"+b.c,'<span class="mi">'+b.i+'</span><div><span class="mt">'+b.t+'</span><span class="md">'+b.ds+'</span></div>');btn.onclick=b.fn;m.appendChild(btn);});}

function renderPicker(app,forStudy){

$("#nxt",app).onclick=function(){if(isLast){finishQuiz();}else{S.idx++;S.rev=false;renderQuiz(app);}};}

function finishQuiz(){stopTimer();var correct=S.qs.filter(function(q){return S.ans[q.id]===q.a;}).length;S.res={correct:correct,total:S.qs.length,ans:Object.assign({},S.ans),questions:S.qs.slice()};if(S.isT){var p=Math.round((correct/S.qs.length)*100);S.stats.push({score:p,passed:p>=PP,date:new Date().toISOString()});saveStats();}go("results");}

function renderResults(app){var R=S.res,pct=Math.round((R.correct/R.total)*100),passed=pct>=PP;var cats={};R.questions.forEach(function(q){if(!cats[q.cat])cats[q.cat]={c:0,t:0};cats[q.cat].t++;if(R.ans[q.id]===q.a)cats[q.cat].c++;});var wrong=R.questions.filter(function(q){return R.ans[q.id]!==q.a;});var catH="";Object.keys(cats).forEach(function(cat){var d=cats[cat],p=Math.round((d.c/d.t)*100);catH+='<div class="cr"><span class="cname">'+cat+'</span><div class="cbg"><div class="cfill '+(p>=PP?"g":"w")+'" style="width:'+p+'%"></div></div><span class="cpct">'+d.c+'/'+d.t+'</span></div>';});var revH="";wrong.forEach(function(q){revH+='<div class="rc"><span class="ddot" style="background:'+DC[q.d]+'"></span><p class="rq">'+q.q+'</p>'+(R.ans[q.id]!==undefined?'<p class="ry">Yours: <strong>'+q.o[R.ans[q.id]]+'</strong></p>':'<p class="ry un">Not answered</p>')+'<p class="rok">Correct: <strong>'+q.o[q.a]+'</strong></p></div>';});
app.innerHTML='<div class="res"><div class="rh '+(passed?"pass":"fail")+'"><div class="rs">'+pct+'%</div><div class="rv">'+(S.isT?(passed?"PASSED":"NOT YET"):"COMPLETE")+'</div><div class="rd">'+R.correct+'/'+R.total+' correct'+(S.isT?' \u00b7 '+PP+'% required':'')+'</div></div><div class="cb"><h3>By Category</h3>'+catH+'</div>'+(wrong.length>0?'<div class="rr"><h3>Review ('+wrong.length+')</h3>'+revH+'</div>':'<div class="perf">\ud83c\udf89 Perfect score!</div>')+'<div class="ra"><button class="ab" id="retry">Try Again</button><button class="ab sec" id="rhome">Home</button></div></div>';
$("#retry",app).onclick=function(){if(S.isT){S.qs=shuffle(QUESTIONS).slice(0,TS);S.isT=true;S.idx=0;S.ans={};S.rev=false;S.tl=TT;go("quiz");}else go("study-pick");};
$("#rhome",app).onclick=function(){go("home");};}

loadStats();render();
</script>
</body>
